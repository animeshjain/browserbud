<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrowserBud</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Menu bar */
    #menu-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 10px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
      user-select: none;
    }
    #menu-bar .brand {
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    #menu-bar .settings-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    #menu-bar .settings-btn:hover {
      color: #e0e0e0;
      background: rgba(255,255,255,0.1);
    }

    /* Terminal iframe */
    #terminal-frame {
      width: 100%;
      height: calc(100% - 32px);
      border: none;
      display: none;
    }

    /* Setup screen */
    #setup-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 32px);
      padding: 24px;
      color: #e0e0e0;
      text-align: center;
    }
    #setup-screen h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    #setup-screen p {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
      max-width: 280px;
    }
    #setup-screen input {
      width: 100%;
      max-width: 300px;
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: #e0e0e0;
      font-size: 14px;
      margin-bottom: 12px;
    }
    #setup-screen input:focus {
      outline: none;
      border-color: #5865f2;
    }
    #setup-screen button {
      padding: 8px 24px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    #setup-screen button:hover {
      background: #4752c4;
    }
    #setup-screen .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }

    /* Settings modal */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #settings-overlay.visible {
      display: flex;
    }
    #settings-modal {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 20px;
      width: 320px;
      max-width: 90%;
      color: #e0e0e0;
    }
    #settings-modal h3 {
      margin-bottom: 12px;
      font-size: 15px;
    }
    #settings-modal label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    #settings-modal input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: #e0e0e0;
      font-size: 13px;
      margin-bottom: 12px;
    }
    #settings-modal input:focus {
      outline: none;
      border-color: #5865f2;
    }
    #settings-modal .btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    #settings-modal button {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
    }
    #settings-modal .btn-save {
      background: #5865f2;
      color: #fff;
    }
    #settings-modal .btn-save:hover {
      background: #4752c4;
    }
    #settings-modal .btn-cancel {
      background: #333;
      color: #ccc;
    }
    #settings-modal .btn-cancel:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div id="menu-bar">
    <span class="brand">BrowserBud</span>
    <button class="settings-btn" id="settings-btn" title="Settings">&#9881;</button>
  </div>

  <iframe id="terminal-frame"></iframe>

  <div id="setup-screen">
    <h2>Welcome to BrowserBud</h2>
    <p>Enter the URL of your BrowserBud server. If running locally, use the default.</p>
    <input type="url" id="setup-url" placeholder="http://localhost:8080" value="http://localhost:8080" />
    <button id="setup-connect">Connect</button>
    <div class="error" id="setup-error"></div>
  </div>

  <div id="settings-overlay">
    <div id="settings-modal">
      <h3>Settings</h3>
      <label for="settings-url">Server URL</label>
      <input type="url" id="settings-url" placeholder="http://localhost:8080" />
      <div class="btn-row">
        <button class="btn-cancel" id="settings-cancel">Cancel</button>
        <button class="btn-save" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
